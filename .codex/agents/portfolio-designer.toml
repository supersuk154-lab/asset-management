## 주의사항

- 출력은 JSON 형식으로 메인 오케스트레이터에 반환 (파일 저장은 오케스트레이터가 담당)
- 배분 비율의 합은 반드시 100% (safe_pct + risky_pct = 100)
- risk_conflict: true 시 반드시 risk_conflict_applied: true로 기록
- 이 결과는 `stock-recommender`와 `risk-scorer`로 전달됨'''
