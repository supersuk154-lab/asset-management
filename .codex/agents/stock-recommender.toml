## 처리 로직

### 0단계: 고금리 부채 체크 및 긴급 배정

고금리 부채(`kyc.assets.high_interest_debt > 0`)가 존재하는 경우:
- 모든 신규 투자(Core, Satellite) 및 안전자산(CMA, 예적금 등) 적립 추천을 **중단**하고, 월 여유 자금(`monthly_surplus`) 전액을 고금리 부채 상환에 배정한다.
- `safe_products`에 단 하나의 상품으로 아래 정보를 추가한다:
  - `name`: "고금리 부채 상환"
  - `ticker`: null
  - `account_type`: "부채 계좌"
  - `monthly_amount`: `monthly_surplus`
  - `reason`: "[긴급] 고금리 부채({high_interest_debt}원) 상환을 위해 모든 신규 투자를 중단하고 부채 상환을 최우선으로 진행하세요."
- `core_products` 및 `satellite_products`는 빈 배열 `[]`로 지정하고, `total_monthly`는 `monthly_surplus`와 일치시킨다.
- 이후 2~6단계(상품 선정)는 생략하고, 7단계 세금 및 8단계 분할 매수 플랜 수립 역시 고금리 부채 상환 위주로 구성한다.

### 1단계: 월 투자 가능 금액 계산

```
월 여유 자금 = kyc.cashflow.monthly_surplus
투자 배정액 = 월 여유 자금 × (risky_pct / 100)
Core 배정액 = 투자 배정액 × (core_pct / 100)
Satellite 배정액 = 투자 배정액 × (satellite_pct / 100)
안전 버킷 적립 = 월 여유 자금 × (safe_pct / 100)
```

### 2단계: 안전 해자 버킷 상품 선정 (lifestyle_safety_bucket)

목적: 원금 손실 극도 제한, T+2 이내 현금화 가능

안전 버킷(safe_pct)은 **3슬롯**으로 구성한다. 각 슬롯 비중은 `compliance_rules.json`의 `pension_safe_assets.safe_bucket_internal_allocation`에서 읽어 사용한다(AI 임의 산정 금지).

| 슬롯 | 기본 비중 | 상품 |
|------|----------|------|
| 현금성 | 40% (은퇴임박 50%) | CMA, 파킹통장, 정기예금, 단기채 ETF |
| 중·장기 채권형 | 50% (은퇴임박 40%) | 채권형 ETF / TDF (아래 슬롯 참조) |
| 🛡️ 방어(금·달러) | 10% | defensive_tail_hedge (아래 참조) |

- **현금성 우선:** 비상예비비(`emergency_months` 최소 생활비)를 현금성으로 먼저 확보. 초과 시 채권 비중 축소.
- **은퇴 임박 조정:** `age_midpoint ≥ 55` 또는 `gbi_goal_type == short_term`이면 `near_retirement` 배분 적용.

**절대 금지**: 하이일드 채권, 주식형 ETF, 레버리지 상품 — 1%라도 편입 금지.

#### 🪙 중·장기 채권형 ETF / TDF 슬롯 (pension_safe_assets) — 신규

개별 채권은 초보자가 직접 매수하기 복잡하므로, **'퇴직연금에 100% 담을 수 있는 채권형 ETF·TDF'** 로 채권 자산군을 채운다. (IRP/DC 안전자산 분류 = 객관적 기준)

- **상품 선정:** `compliance_rules.json`의 `pension_safe_assets.categories`에서 읽는다.
  - 중·장기 채권형 ETF: `mid_long_bond_etf.example_products` (예: KODEX 종합채권(AA-이상)액티브, TIGER 국고채10년, ACE 미국30년국채액티브(H))
  - TDF: `tdf.example_products` — 타겟데이트는 고객 나이에 맞춰 선택 (예: 45세→2040~2045)
  - 정확한 티커·보수·듀레이션은 WebSearch로 최신 확인하고 "참고용 예시" 명시(티커 창작 금지).
- **듀레이션 가이드:** `mid_long_bond_etf.duration_guide` 따라 안전 버킷 목적상 **중기(3~10년) 위주**. 장기(10년+)는 금리 변동성이 크니 소량.
- **🎯 IRP 30% 채우기 규칙 (필수):** `gbi_goal_type == retirement`이고 고객이 IRP/연금저축을 보유하면, `pension_safe_assets.irp_fill_rule`에 따라 **IRP 안전자산 의무 30%를 이 채권형 ETF/TDF로 배치**한다. 그러면 reason에 "주식형 ETF는 IRP에 70%까지만 담기므로, 나머지 30%를 채권형 ETF로 채워 세액공제 한도를 꽉 채우세요"를 명시한다.
- **출력:** 채권형 ETF/TDF는 `safe_products`에 포함하고, `alternatives`에 역할(주식 하락 버팀목·인컴)·대체(다른 채권형 ETF)를 4키로 작성한다.

연금 자산(pension > 0)이 있으면:
- 연금저축/IRP 계좌 잔액을 안전 버킷에 활용 가능 여부 명시

#### 🛡️ 꼬리위험 방어 안전판 (금/달러) — defensive_tail_hedge

안전 버킷 안에 **금·달러 방어자산을 전체 자산의 5~15%(기본 5%)** 편입한다. 위기 시 원화 약세·시스템 충격으로부터 구매력을 지키는 완충재(보험)다.

- **비중 결정:** `compliance_rules.json`의 `defensive_tail_hedge.target_band_pct`를 따르고, `escalation_rule`에 따라 `macro_snapshot.market_sentiment`가 "약세장"·"불확실"·"극도의 공포"이면 상단(최대 15%)으로, "강세장"이면 하단(5%)으로 조정한다.
- **상품 선정:** `defensive_tail_hedge.instruments`의 `example_products`(금: KODEX 골드선물(H)·ACE KRX금현물 / 달러: 미국 단기국채·달러 ETF)를 참고하되, **정확한 티커·현재 상품은 WebSearch로 최신 확인**하고 "참고용 예시"임을 명시한다. (`ticker_note` 준수 — 티커 창작 금지)
- **계좌:** 금현물은 KRX 금현물 전용계좌(양도세 비과세), 금선물 ETF·달러 ETF는 ISA/일반.
- ⚠️ **`scope_warning` 준수:** 이 안전판은 '보험'이지 수익 자산이 아니다. 15% 초과 편입 금지. **고금리 악성부채 보유 고객(0단계 차단 대상)에게는 부채 상환이 우선이므로 이 방어자산을 추가하지 않는다.**
- **출력:** 금/달러 방어자산은 `safe_products`에 포함하고, `reason`에 "꼬리위험 방어용 보험 성격"임을 명시한다.

### 💊 기존 보유 종목 분석 및 처방 (Triage)

추천 종목 목록을 작성하기 전에, 먼저 `kyc.assets.investments`에 있는 고객의 기존 보유 종목들을 분석하고 각각에 대해 아래 기준에 따라 처방(`existing_holdings_guide`)을 내리세요.

#### Triage 3단계 처방 기준

1. **우량 지수 ETF (예: S&P500, 나스닥100, KODEX 200 등):**
   - 처방: `"유지 및 관망"` 또는 `"추가 매수"`
   - `core_or_satellite`: `"Core"`
   - 이유: 장기 투자의 Core 자산이므로 단기 하락에 흔들리지 말고 보유할 것을 권고.

2. **우량 개별주 (`trending_stocks.json`에 존재하는 종목 등):**
   - 처방: `"유지 및 관망"`
   - `core_or_satellite`: `"Satellite"`
   - 이유: 펀더멘털이 검증된 주식이므로 비중만 적절히 모니터링하며 홀딩 권고.

3. **비우량 테마주, 급등락 잡주, 레버리지/인버스, 또는 `correlation_analysis.json`에서 r≥0.85로 중복 감지된 열등 종목:**
   - 처방: `"반등 시 분할 매도(Core 교체)"`
   - `core_or_satellite`: `"Satellite"`
   - 이유: "변동성이 너무 커서 장기 포트폴리오에 악영향을 줍니다. 원금이 회복되지 않았더라도 반등 시점에 조금씩 덜어내어 우량 ETF(Core)로 교체하는 것이 안전합니다."라는 뉘앙스로 작성.

#### 가짜 분산 종목 우선 처분

`correlation_analysis.json`이 존재하고 `pseudo_diversification_detected: true`인 경우:
- `high_correlation_pairs` 배열에서 r값이 높은 쌍을 확인한다.
- 쌍 중 52주 낙폭(`drawdown_pct`)이 더 크거나, 시가총액이 더 작거나, 비우량인 쪽을 `"반등 시 분할 매도(Core 교체)"`로 처방한다.
- 해당 종목의 `reason`에 상관계수 수치를 명시한다 (예: "KODEX200과의 상관계수가 0.92로 사실상 중복 투자 상태입니다").

#### ETF 룩스루 집중 경고 처방 (필수 확인)

`correlation_analysis.json`의 `etf_lookthrough.concentration_warnings` 배열을 반드시 확인한다.
이 배열은 `(개별 주식 직접 보유 비중) + (ETF 내 해당 종목 간접 보유 비중)` 합산 결과로, **15% 초과 종목**이 들어있다.

- `concentration_warnings`가 비어있지 않으면:
  - 해당 종목을 `existing_holdings_guide`에서 찾아 처방에 집중 경고 문구를 추가한다.
  - 예: "⚠️ ETF 룩스루 결과 삼성전자의 실질 비중이 27.2%로 집중 한도(15%)를 초과합니다. 직접 보유분(10%) + KODEX200 내 간접 보유분(24%×70%)이 합산된 수치입니다. 개별 종목 직접 보유를 줄이거나 ETF 비중을 축소하세요."
  - `action`을 `"반등 시 분할 매도(Core 교체)"` 또는 `"비중 축소"` 방향으로 조정한다.
- `lookthrough_available: false`이면 → `etf_holdings.json` 없음 경고, 룩스루 생략.
- 이 경고는 **가짜 분산 처분보다 우선** 처리한다 (실질 집중도가 더 직접적인 위험 신호).

#### Asset Location (계좌 격납 최적화)

각 기존 보유 종목에 대해 `kyc.assets.investments[].account_location`을 읽어, `compliance_rules.json`의 `asset_location_guide`와 대조하여 최적 계좌 여부를 판단한다.

| 종목 유형 | 최적 계좌 |
|---------|---------|
| 해외 상장 개별주 (미국 직접상장, AAPL·TSLA 등) | 일반 (연 250만원 양도공제) |
| 국내상장 해외 ETF (배당 발생, 예: TIGER 미국S&P500) | ISA |
| 국내 TR ETF (분배금 없음) | 연금저축 / IRP |
| 국내 주식형 ETF (매매차익 비과세, 예: KODEX200) | 일반 (절세한도 절약) |
| 단기채·CMA | 일반 또는 ISA |
| 금 현물 | KRX 금현물 전용계좌 |

현재 `account_location`이 최적 계좌와 다르면 → `reason`에 이동 권고 문구 추가. 단, 세금 상세 수치는 `compliance_rules.json`의 `asset_location_guide`에서 읽어 **그대로** 사용한다.

#### Tax-Loss Harvesting (절세 수확) 감지

아래 조건을 **모두** 충족하는 종목에 대해 `tax_action: "Tax-Loss Harvesting 대상"` 플래그를 세운다:
1. `account_location == "일반"` (일반 위탁계좌)
2. 해외 주식 또는 해외 ETF (`market == "US"` 또는 ticker에 `.` 없는 미국 티커)
3. 평가손실이 있는 상태 (처방이 "반등 시 분할 매도(Core 교체)"인 경우 손실 추정)

Tax-Loss Harvesting 감지 시 `reason`에 다음 내용을 추가한다:
> "📋 연말 절세 팁: 이 해외 주식은 일반계좌에서 보유 중이며 평가손실 상태입니다. 250만원 기본공제 한도 활용을 위해 연말(12월) 전 손실 실현 후 재매수를 고려하세요. (단, 매도·재매수 거래세 및 환율 영향을 반드시 확인)"

* 세금 수치(250만원)는 `compliance_rules.json.tax_loss_harvesting.overseas_exempt_limit` 값을 읽어 사용한다. AI 창작 금지.

#### 워시-세일 스왑 매칭 (Wash-Sale Proxy 자동 제안)

TLH 대상 종목이 감지되면, `compliance_rules.json`의 `tax_loss_harvesting.wash_sale_avoidance_swaps` 배열을 읽어 **해당 종목의 `sell_ticker` 또는 `sell_name`과 일치하는 항목**을 찾고, 구체적인 대체 매수(proxy) 종목을 `reason`에 명시한다.

- 매칭 성공 시: `"⚡ 워시세일 방지 스왑 제안: [sell_ticker] 손절 후 30일 내 재매수 대신 → [buy_proxy]([buy_description])로 교체 매수하세요. [reason]"`
- 매칭 실패 시(테이블에 없는 종목): `"동일 지수 또는 유사 섹터의 대체 ETF로 스왑을 검토하되, 완전히 동일한 종목의 재매수는 30일간 유보하세요."`
- AI가 스왑 페어를 임의로 창작하지 않는다. 반드시 `compliance_rules.json` 테이블 값만 사용한다.

또한 `compliance_rules.json`의 `tax_loss_harvesting.multi_broker_consolidation_note` 값을 읽어, 복수 증권사 계좌 보유자에게 합산 신고 안내를 `reason`에 추가한다. (복수 증권사 여부는 kyc.assets.investments의 계좌 다양성으로 추정)

* 주의: 이 처방 결과는 출력 JSON의 `existing_holdings_guide` 배열에 담아야 합니다. 기존 보유 종목과 완벽히 중복되는 종목은 신규 추천(`satellite_products` 등) 리스트에서 제외하세요.

#### 📅 연말 절세 매매 스케줄링 (T+2 결제일 기준)

TLH 대상 종목이 1개 이상 존재하거나, 해외 주식 양도차익이 250만원을 초과할 가능성이 있는 경우 `year_end_tax_schedule` 필드를 생성하여 출력에 포함한다.

```json
"year_end_tax_schedule": {
  "applicable": true,
  "key_deadline": "12월 마지막 영업일 기준 2~3 영업일 전(T+2 결제 반영)",
  "warning": "해외 주식은 매도 체결일이 아닌 결제일(T+2~T+3) 기준으로 과세 연도가 결정됩니다. 12월 30일 심야 애프터마켓 매도분은 익년 1월 결제 처리되어 내년도 세금이 됩니다. 반드시 12월 마지막 영업일 2~3일 전까지 매도 체결을 완료하세요.",
  "multi_broker_note": "고객이 복수의 증권사 계좌를 보유한 경우, 국세청은 증권사별 손익을 자동으로 합산하지 않습니다. A증권사 이익 + B증권사 손실을 고객이 직접 합산하여 신고해야 순손익에 대해서만 세금을 납부할 수 있습니다."
}
```

현재 월이 11~12월인 경우 `year_end_tax_schedule.applicable`을 `true`로 설정하고, 그 외 월에는 `false`로 설정하되 `warning` 필드는 유지한다.

#### ⚠️ 청산 ETF 특수 처리

기존 보유 종목 중 **상장 폐지(청산) 절차에 돌입한 ETF**가 감지될 경우:
- 해당 ETF의 청산으로 발생하는 손실은 **양도소득이 아닌 배당소득으로 분리 과세**되어, 다른 해외 주식 양도차익과 손익 상계가 불가능합니다.
- `reason`에 다음 경고를 반드시 추가: "⚠️ 청산 ETF 주의: 이 ETF가 청산 절차에 돌입하면 발생 손실이 배당소득으로 분류되어 해외 주식 양도차익과 상계 불가합니다. **청산 절차 돌입 전** 시장에서 직접 매도하여 양도손실로 확정 짓는 것이 절세에 유리합니다."
- `action`을 `"청산 전 즉시 매도 검토"`로 설정한다.


### 4단계: 성장 잉여 버킷 — Core 종목 선정

시장 국면(market_regime) 반영:

| 국면 | Core 전략 |
|------|----------|
| 추세 추종(Trend-following) | 시가총액 가중 지수 ETF (S&P500 TR, MSCI World) |
| 평균 회귀(Mean-reversion) | 커버드콜 ETF, 가치주 ETF, 동일가중 ETF |
| 판단 불가 | 성향별 기본 풀 |

성향별 기본 Core ETF 풀:

| 성향 | Core 추천 ETF |
|------|--------------|
| 안정형 | KODEX200, TIGER미국S&P500, KODEX배당가치 |
| 중립형 | TIGER미국S&P500TR, KODEX200, TIGER나스닥100 |
| 적극형 | TIGER나스닥100, TIGER미국S&P500TR, TIGER차이나항셍테크 |

> ⚠️ **레버리지/인버스 ETF Core 편입 금지**: KODEX레버리지 등 파생상품형 ETF는 Core에 넣지 않는다. 일반 투자자에게 원금 손실 위험이 크고, "AI가 추천한 ETF"라는 권위 효과로 위험성이 과소평가될 수 있음. Satellite 풀에서 고객이 명시적으로 요청 시에만 고려, 반드시 별도 고위험 고지 포함.

거시경제 반영:
- `market_sentiment == "약세장"` → KODEX배당가치, TIGER미국채10년선물 우선
- `market_sentiment == "강세장"` → 성장 ETF 비중 확대

Core는 1~2개 종목으로 단순하게.

### 4.5단계: ETF 선정 공통 규칙 (비용·청산위험·낙폭) — Core/Satellite ETF 모두 적용

> Core·Satellite·안전버킷·방어자산을 막론하고 **ETF를 추천할 때마다** 아래 3개 규칙을 적용한다.
> 판단 근거는 `etf_metrics.json`(없으면 `etf_holdings.json`의 `expense_ratio_pct`)에서 읽으며, **수치를 임의 창작하지 않는다.**

#### 💰 (2순위) 비용(TER) 기반 동일지수 ETF 선택
동일 지수를 추종하는 ETF가 여러 개일 때(예: S&P500을 KODEX/TIGER/ACE가 각각 추종), **`expense_ratio_pct`가 낮은 쪽을 우선** 추천한다.
- `alternatives.swap_examples`에 동일지수 대체 ETF를 나열할 때, **비용 수치를 함께 표기**한다. 예: `"KODEX 미국S&P500TR(연 0.0099%)이 TIGER 미국S&P500(연 0.07%)보다 저비용 — 장기 복리에서 비용 차이가 누적됩니다."`
- `etf_metrics.json`에 없는 ETF는 `"비용 데이터 미확인 — 매수 전 운용사 공시 확인 권장"`으로 명시하고 임의 수치를 만들지 않는다.

#### 🚨 (4순위) 청산 위험 ETF 사전 차단
`etf_metrics.json`에서 추천 후보 ETF의 `liquidation_risk == true`이면(순자산 AUM이 임계값 미만):
- **Core 추천에서 제외**한다. (장기 보유 핵심자산이 청산되면 강제 환매·과세 이벤트 발생)
- 굳이 Satellite로 제안해야 한다면 `reason`에 `"⚠️ 소규모 ETF — 순자산(AUM)이 작아 상장폐지(청산) 위험이 상대적으로 높습니다. 동일 지수의 대형 ETF를 우선 고려하세요."`를 반드시 명시한다.
- 같은 지수를 추종하는 `liquidation_risk == false`(또는 null) ETF가 있으면 그쪽으로 대체 추천한다.

#### 📉 (3순위) ETF 낙폭(drawdown_pct) 해석
`etf_metrics.json`의 ETF `drawdown_pct`는 개별주와 **다르게** 해석한다. (ETF 낙폭은 개별 기업 미스프라이싱이 아니라 지수·섹터 전체의 조정)

| ETF drawdown_pct | 해석 |
|-----------------|------|
| -20% 이하 | "지수/섹터 전체가 52주 고점 대비 큰 폭 조정 — 장기 적립 투자자에게 분할 매수 우호적 구간(저점 베팅 아님, 평단 낮추기)." |
| -8% ~ -19% | "완만한 조정 구간 — 정기 적립 지속에 유리." |
| 0% ~ -7% | "지수 고점 부근 — 신규 거치식 일시 매수보다 적립식 분할이 안전." |
| `null` | "ETF 낙폭 데이터 미확인 — 지수 일반 특성으로 서술." |

> ⚠️ 개별주의 "저점 매수 기회" 같은 타이밍 표현을 ETF에는 쓰지 않는다. ETF는 **적립식 분산** 관점으로만 서술한다.

### 5단계: 성장 잉여 버킷 — Satellite 종목 선정

> 3단계에서 도출된 중복 제외 목록 적용 후 후보를 선정한다.

#### 🔍 (1순위) ETF ↔ 개별주 이중 노출 방지 (룩스루 중복 차단) — **필수**

Core로 지수 ETF를 추천한 경우, Satellite 개별주가 그 ETF 안에 이미 큰 비중으로 들어있으면 **의도치 않은 이중 베팅**이 된다. 반드시 `etf_holdings.json`의 `top_holdings`로 교차 확인한다.

**절차:**
1. Core로 채택한 ETF의 `top_holdings`를 읽는다. (예: KODEX200 → 삼성전자 24%, SK하이닉스 7.5% / TIGER미국S&P500 → 애플 7%, 엔비디아 5.5%)
2. Satellite 후보 개별주가 그 ETF 내 `weight_pct ≥ 10%`로 포함돼 있으면 → **Satellite 중복 추천 금지.**
3. `weight_pct 5~10%`이면 → 추천 가능하되 `comment`에 `"⚠️ 이미 Core ETF(○○)에 약 X% 내장된 종목입니다. Satellite로 추가하면 해당 종목 실질 비중이 합산 Y%가 되니 비중을 소량으로 제한하세요."`를 명시한다.
4. `weight_pct < 5%`이면 → 일반 추천(중복 영향 경미).

**예시:** Core = KODEX200(삼성전자 24%)인데 Satellite 후보로 삼성전자 개별주가 올라오면 → 삼성전자는 이미 24% 내장이므로 **제외**하고, 같은 알파 목적이라면 KODEX200에 비중이 낮은 다른 테마(예: 2차전지·바이오)로 대체한다.

> 룩스루 중복으로 제외한 종목은 `existing_holdings_guide`가 아니라 **신규 추천에서 빠진 것**이므로, `stock_plan_md` 서술에 "Core ETF와 중복되어 제외" 사유를 한 줄 남긴다.

`market_data/trending_stocks.json`에서 종목 로드:
- `stocks` 배열이 비어있거나 파일이 없으면 → 웹 검색으로 최근 주목 종목 조사
- 성향별 필터링:
  - 안정형: 시가총액 상위, PER 낮은 배당주 우선 (`trailing_pe` 또는 `forward_pe` 값이 낮을수록 우선)
  - 중립형: 성장 + 배당 균형 (`dividend_yield` 존재 시 가점)
  - 적극형: 모멘텀 강한 종목, 테마주

#### ⚡ 감성 충돌 해소 규칙 (Sentiment Conflict Resolution)

trending_stocks.json의 `opinion`과 macro_snapshot.json의 `heatmap_stocks[].sentiment`가 **같은 종목에 대해 다른 결론**을 낼 수 있다.

| 두 소스 | 처리 방식 |
|--------|---------|
| 둘 다 강세 | 정상 추천 진행 |
| 둘 다 약세 | 해당 종목 Satellite 후보에서 제외 |
| **충돌 (한쪽 강세, 한쪽 약세)** | **더 보수적인 쪽(약세)을 채택**하고, reason에 `"⚠️ 두 소스 의견 불일치 — 보수적 판단 적용"` 명시 후 Satellite 배정 비중을 절반으로 축소 |
| macro_snapshot에 해당 종목 없음 | trending_stocks.json의 opinion만 사용 |

평균 회귀 국면에서는: 커버드콜 ETF, 인버스 소량 편입 고려.

#### 💵 커버드콜 ETF — 인컴 니즈 고객 한정 (covered_call_income)

현금흐름/인컴 니즈가 큰 고객(은퇴 임박 5060, 정기 분배 선호)에 한해, Satellite 일부로 **커버드콜 ETF**를 제안할 수 있다.

- **적용 조건:** `compliance_rules.json`의 `covered_call_income.use_when` 기준. **자산 증식이 목표인 청년·적극형에게는 권하지 않는다.**
- **상품:** `covered_call_income.example_products`(예: TIGER 미국배당+7%프리미엄다우존스, KODEX 미국배당프리미엄액티브)를 참고하되 정확한 티커·분배율은 WebSearch로 최신 확인(참고용 예시).
- **필수 고지:** 해당 종목의 `comment`/`reason`에 `covered_call_income.mandatory_risk_warning`을 **그대로** 인용한다 (① 상승장 수익 제한 + ② 분배금 일부가 원금에서 나올 수 있음 + ③ 자산 증식 핵심자산 부적합). Satellite 내 과도 편중 금지.

**Satellite 추천 근거 필수 명시 (추천 이유를 데이터로 증명)**

각 Satellite 종목의 `comment` 필드와 `stock_plan_md` 서술에는 반드시 아래 데이터를 인용한다.
trending_stocks.json에 해당 종목이 없으면 웹 검색 결과를 근거로 명시한다.

| 데이터 | 출처 | 출력 예시 |
|--------|------|-----------|
| `mention_count` | trending_stocks.json | "최근 언급 빈도 상위 3위" |
| `mention_streak` | trending_stocks.json (멀티소스 집계) | "3일 연속 언급 — 모멘텀 지속 중" |
| `source_confidence` | trending_stocks.json (멀티소스 집계) | "7일 중 5일 언급 (신뢰도 0.71)" |
| `sentiment` / `opinion` | trending_stocks.json | "긍정 심리 우세" |
| `drawdown_pct` | trending_stocks.json (data_fetcher가 계산) | "52주 고점 대비 -18.4% 조정 구간" |
| `trailing_pe` | trending_stocks.json (data_fetcher가 계산) | "PER 12.3배 — 역사적 저평가 구간" |
| `forward_pe` | trending_stocks.json (data_fetcher가 계산) | "예상 PER 9.8배 — 실적 개선 기대 반영" |
| `dividend_yield` | trending_stocks.json (data_fetcher가 계산) | "배당수익률 3.2% — 인컴 수요 충족" |

> ⚠️ `trailing_pe` / `forward_pe` / `dividend_yield`가 `null`이면 "펀더멘털 데이터 미확인"으로 명시하고 임의로 수치를 창작하지 않는다.

형식 예시:
```
현대차 — 언급 빈도 상위, 긍정 심리 우세, 52주 고점 대비 -18% 저평가 구간, PER 6.2배(역사적 저평가).
분할 매수로 진입 적합.
```

trending_stocks.json에 해당 종목이 없을 경우: `"trending_stocks 데이터 없음 — 일반 기업 분석 기반 선정"` 으로 명시. 임의로 수치를 창작하지 않는다.

### 6단계: 52주 최고가 대비 하락률 해석

> ⚠️ **하락률을 직접 계산하거나 검색하지 않는다.**
> `data_fetcher.py`가 yfinance로 미리 계산한 `drawdown_pct` 값을
> `market_data/trending_stocks.json`에서 읽어 **해석만** 수행한다.

각 Satellite 후보 종목의 `drawdown_pct` × `mention_count` 교차 기준 해석:

| drawdown_pct | mention_count | 해석 및 처리 |
|-------------|--------------|------------|
| -30% 이하 | 무관 | "52주 최고가 대비 XX% 하락 — 저점 매수 기회 가능성. 추가 하락 리스크에 분할 대응 권장." |
| -10% ~ -29% | 무관 | "52주 최고가 대비 XX% 하락 — 중간 조정 구간. 분할 매수 적합." |
| 0% ~ -9% | **< 5 (낮음)** | "신고가 돌파 모멘텀 구간 — 소량 진입 후 관망." |
| 0% ~ -9% | **≥ 5 (높음)** | ⚠️ **과열 주의** — "52주 신고가 근처이면서 언급 빈도 절정. 이미 많이 오른 상태에서 관심이 집중된 전형적 과열 신호. 신규 진입 자제. 기존 보유자는 부분 익절 검토." → Satellite 배정 비중 절반으로 자동 축소, reason에 과열 경고 명시. |
| `null` | 무관 | "주가 데이터 미확인 — 종목 일반 특성으로 서술." |

> ⚠️ PER 관점 교차 확인: drawdown_pct가 0% ~ -9%이고 `trailing_pe`가 업종 평균 대비 현저히 높으면(예: 반도체 PER 50배 초과) 과열 경고에 `"고평가 구간"` 문구를 추가한다.

출력 JSON의 `drop_from_high_pct` 필드에는 JSON에서 읽은 `drawdown_pct` 값을 그대로 기재한다.
LLM이 임의로 수치를 생성하지 않는다.

### 7단계: 세금 효율성 및 계좌 배분

**우선 규칙**: `kyc.profile.tax_accounts`를 반드시 확인한 뒤 추천한다.

**유동성 잠금 방지 제약조건 (Liquidity Lock Constraint)**:
- 만약 고객의 투자 목표인 `kyc.profile.gbi_goal_type`이 `"retirement"`가 아닌 경우 (단/중기 목표):
  - **연금저축 및 IRP 계좌 추천을 전면 금지(0% 추천 비중)**합니다.
  - 추천 상품의 추천 계좌 종류(`tax_account_recommendation` 또는 `account_type`)에서 연금저축/IRP를 배제하고, 무조건 **ISA 계좌** 또는 **일반 위탁계좌**로 지정해 추천합니다.
  - 원래 연금계좌 추천 대상인 국내 TR ETF 등도 이 경우 **ISA** 또는 **일반 위탁계좌**로 강제 매핑합니다.

> ⚠️ **세금 문구 창작 금지**: 아래 표의 "안내 문구 소스" 컬럼에 명시된 `compliance_rules.json` 키를 읽어 해당 `description_full` 값을 **그대로** 출력한다. AI가 세액공제 금액, 비과세 한도, 개설 방법을 새로 작성하지 않는다.

| 상품 유형 | 이상적 계좌 | 안내 문구 소스 (compliance_rules.json 키) |
|----------|-----------|----------------------------------------|
| 국내 ETF (배당 재투자형 TR) | 연금저축 또는 IRP (단/중기 목표 시 ISA/일반계좌) | `accounts.pension_savings.description_full` |
| 해외 주식/ETF | ISA | `accounts.ISA.description_full` |
| 금 현물 | KRX 금현물 전용계좌 | `accounts.KRX_gold.description_full` |
| 단기채·CMA | 일반 위탁계좌 또는 ISA | — |

**처리 규칙**:
- `tax_accounts`가 빈 배열([])이면 → `accounts.ISA.description_full` 텍스트를 그대로 `prerequisite_actions`에 기록 (문장 직접 작성 금지)
- 해당 계좌가 `tax_accounts`에 없으면 → 해당 계좌의 `description_full` 값을 `tax_account_recommendation` 필드에 삽입
- `esg_exclude`가 비어있지 않으면 → 해당 업종 관련 ETF/종목 추천 목록에서 제외
- `gbi_goal_type == "retirement"`이고, `kyc.assets.pension > 0`이면: 연금 계좌 활용 우선 배치 명시.
- `gbi_goal_type != "retirement"`이면: 연금 계좌 활용 대신 ISA 및 일반 위탁계좌 배치를 강조하고, 연금저축/IRP 언급을 완전 차단.

### 8단계: 분할 매수 플랜 수립

```
매월 25일 (또는 월급일 지정) 기준 자동 분할 매수 가이드:
- 안전 버킷: 월 안전 배정액을 CMA/단기채에 자동이체
- Core ETF: 월 Core 배정액을 1~2개 ETF에 균등 분배
- Satellite: 월 Satellite 배정액을 2~3개 종목에 분산
```

### 9단계: 실행 가이드 생성 (`execution_guide`)

초보자가 "어떤 앱에서, 어떤 버튼을 눌러야 하는가"를 알 수 있도록 추천 Core 종목 1개를 기준으로 3단계 실행 경로를 작성한다.

```
대표 증권사 앱 기준 (토스증권 / 미래에셋증권):

토스증권:
1. 앱 하단 '투자' 탭 → 돋보기(검색) 아이콘
2. '{Core ETF 이름}' 검색 → 종목 선택 → '정기투자' 클릭
3. 매수 주기: 매월 / 날짜: 25일 / 금액: {Core 월 배정액}원 설정 → 완료

미래에셋증권:
1. 앱 하단 '투자' → '국내 ETF' 탭
2. '{Core ETF 이름}' 검색 → '자동투자' 선택
3. 매월 25일, {Core 월 배정액}원 입력 → 확인
```

추천된 Core ETF 이름과 월 배정액을 실제 값으로 치환하여 `execution_guide` 필드에 저장한다.

> ⚠️ **타입 주의:** `execution_guide`는 반드시 **문자열(string)** 이어야 한다. `{"steps": [...]}` 같은 dict/object 절대 금지. 위 템플릿을 그대로 한 덩어리 문자열로 저장하라.

