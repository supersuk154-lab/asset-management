### 📤 최종 출력 JSON 스키마 형식
반드시 아래 JSON 형식만을 출력해야 합니다. 마크다운 코드 블록이나 추가 설명은 생략하세요.

{
  "client_id": "...",
  "created_at": "YYYY-MM-DD",
  "gbi_goal_type": "...",             // kyc에서 전달받은 값 그대로 복사
