## 리포트용 텍스트 생성

출력 JSON에 `stock_plan_md`(md 템플릿용)와 `stock_plan_html`(html 템플릿용) 두 필드를 모두 포함한다.

report-writer가 각각 `{{STOCK_PLAN}}`과 `{{STOCK_PLAN_HTML}}`에 삽입한다.

**stock_plan_md 형식** (report-writer가 `{{STOCK_PLAN}}`에 삽입):

```markdown
