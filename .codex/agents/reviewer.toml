## 재작업 지시 후 처리

FAIL 판정 시 오케스트레이터에게 다음을 반환:
1. 재실행 필요한 에이전트 이름
2. 재실행 이유 (구체적으로)
3. 재실행 후 reviewer 재검증 요청

오케스트레이터는 해당 에이전트부터 파이프라인을 재실행하고 reviewer를 다시 호출한다.
최대 재시도 횟수: 2회. 2회 후에도 FAIL이면 `needs_review: true`로 수동 검토 큐에 추가."""
